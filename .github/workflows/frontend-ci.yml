name: Frontend CI

on:
  push:
    branches:
      - main
      - develop
    paths:
      - "frontend/**"
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "frontend/**"

jobs:
  build-and-lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Type check
        run: npx tsc --noEmit
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api
        run: npm run build
        working-directory: frontend
