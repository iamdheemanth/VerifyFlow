services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: verifyflow
      POSTGRES_USER: vf
      POSTGRES_PASSWORD: vf
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      - postgres

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
